<!-- Hero Background - Santa Barbara SEO Services -->
<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="50%" style="stop-color:#E0F6FF"/>
      <stop offset="100%" style="stop-color:#FFE4B5"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#006994"/>
      <stop offset="100%" style="stop-color:#003d5c"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="1920" height="600" fill="url(#sky)"/>
  <!-- Mountains -->
  <path d="M0 500 L300 300 L600 450 L900 250 L1200 400 L1500 280 L1920 500 L1920 600 L0 600 Z" fill="#5a6b7c"/>
  <!-- Ocean -->
  <rect y="600" width="1920" height="480" fill="url(#ocean)"/>
  <!-- Sun -->
  <circle cx="1600" cy="200" r="80" fill="#FFD700" opacity="0.8"/>
  <!-- Palm tree silhouettes -->
  <path d="M200 650 Q220 550 200 500 Q180 550 200 650" fill="#2d4a3e"/>
  <ellipse cx="200" cy="500" rx="60" ry="20" fill="#2d4a3e"/>
  <path d="M1700 700 Q1720 600 1700 550 Q1680 600 1700 700" fill="#2d4a3e"/>
  <ellipse cx="1700" cy="550" rx="50" ry="15" fill="#2d4a3e"/>
  <!-- Text placeholder -->
  <text x="960" y="400" font-family="Arial" font-size="48" fill="white" text-anchor="middle" opacity="0.3">Santa Barbara SEO</text>
</svg>
